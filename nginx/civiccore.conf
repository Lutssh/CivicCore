server {
    listen 80;
    server_name civil-registry.civiccore.demo;
    # Update this path to your local CivicCore frontends directory
    root /var/www/civiccore/frontends/civil-registry/dist;
    index index.html;
    try_files $uri $uri/ /index.html;
}

